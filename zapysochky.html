<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Записочки</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Lora:ital@1&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#FAF6EF;
    --bg-card:#FFFFFF;
    --border:#E8E0D2;
    --border-soft:#EFE9DC;
    --text:#211D17;
    --text-muted:#9A9282;
    --text-soft:#B7AF9F;
    --accent:#4B46E3;
    --accent-hover:#3E3ACC;
    --accent-soft:#EDECFC;
    --disabled:#C7CDD6;
    --danger:#C4543F;
    --danger-soft:#FBEEEA;
    --ink:#0B1220;
    --radius-lg:24px;
    --radius-md:16px;
    --radius-full:999px;
    --shadow-soft: 0 1px 2px rgba(33,29,23,0.04), 0 8px 24px rgba(33,29,23,0.06);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; }
  body{
    margin:0;
    background: radial-gradient(1200px 800px at 50% -10%, #FDFBF7 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  h1,h2,h3, .display{ font-family:'Sora', 'Inter', sans-serif; letter-spacing:-0.01em; }
  .serif-example{ font-family:'Lora', Georgia, serif; font-style:italic; }
  button{ font-family:inherit; }
  :focus-visible{ outline:2px solid var(--accent); outline-offset:2px; border-radius:8px; }

  #app{ max-width:640px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; padding:0 20px; }

  /* ---------- Header ---------- */
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:22px 2px 6px;
  }
  .logo{
    font-family:'Sora', sans-serif; font-weight:800; font-size:22px;
    background:none; border:none; cursor:pointer; color:var(--text);
    padding:6px 4px; border-radius:10px; letter-spacing:-0.02em;
  }
  .logo:hover{ color:var(--accent); }
  .whoami{
    display:flex; align-items:center; gap:8px;
    font-size:13px; color:var(--text-muted);
    background:var(--bg-card); border:1px solid var(--border-soft);
    padding:6px 12px 6px 8px; border-radius:var(--radius-full);
  }
  .whoami .dot{ width:8px; height:8px; border-radius:50%; background:#3FBF7F; flex-shrink:0; }
  .whoami b{ color:var(--text); font-weight:600; }

  /* ---------- Generic layout ---------- */
  main{ flex:1; display:flex; flex-direction:column; justify-content:center; padding:32px 0 56px; }
  .card{
    background:var(--bg-card); border:1px solid var(--border-soft);
    border-radius:var(--radius-lg); padding:32px 28px; box-shadow:var(--shadow-soft);
  }
  .eyebrow{
    font-size:13px; font-weight:600; color:var(--accent); text-transform:uppercase;
    letter-spacing:0.06em; margin:0 0 10px;
  }
  .center{ text-align:center; }
  .muted{ color:var(--text-muted); }
  .stack{ display:flex; flex-direction:column; gap:14px; }

  /* ---------- Lobby ---------- */
  .player-pills{ display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:20px 0 28px; }
  .player-pill{
    display:flex; align-items:center; gap:6px;
    background:var(--accent-soft); color:#3B3792;
    padding:7px 13px; border-radius:var(--radius-full); font-size:13.5px; font-weight:500;
  }
  .player-pill svg{ width:14px; height:14px; opacity:0.7; }

  .start-btn{
    width:100%; padding:17px 20px; border-radius:var(--radius-lg); border:none;
    font-size:16px; font-weight:700; cursor:pointer; transition:transform .15s ease, background .15s ease;
    color:white; background:var(--accent);
  }
  .start-btn:hover:not(:disabled){ background:var(--accent-hover); transform:translateY(-1px); }
  .start-btn:disabled{ background:var(--disabled); color:#F3F5F7; cursor:not-allowed; }
  .start-btn.waiting{ background:#E9ECEF; color:#9AA3AD; }
  .wait-msg{ color:var(--danger); font-size:13.5px; text-align:center; margin-top:12px; font-weight:500; }

  /* ---------- Round screen ---------- */
  .round-label{ font-size:14px; color:var(--text-muted); font-weight:600; margin-bottom:2px; }
  .question{ font-size:34px; font-weight:700; margin:2px 0 16px; line-height:1.15; }
  .examples{ color:#8B8375; font-size:16.5px; line-height:1.75; margin-bottom:26px; }
  .examples div{ opacity:0.9; }

  .answer-input{
    width:100%; padding:18px 20px; font-size:17px; border-radius:20px;
    border:1.5px solid var(--border); background:#FCFAF6; color:var(--ink);
    transition:background .15s ease, border-color .15s ease; font-family:'Inter', sans-serif;
  }
  .answer-input::placeholder{ color:var(--text-soft); }
  .answer-input:focus{ background:#fff; border-color:var(--accent); }

  .submit-btn{
    width:100%; margin-top:12px; padding:16px 20px; border-radius:20px; border:none;
    background:var(--ink); color:#fff; font-size:16px; font-weight:600; cursor:pointer;
    transition:transform .15s ease, opacity .15s ease;
  }
  .submit-btn:hover:not(:disabled){ transform:translateY(-1px); }
  .submit-btn:disabled{ opacity:0.4; cursor:not-allowed; }

  .answered-pill{
    display:flex; align-items:center; justify-content:center; gap:8px;
    margin:18px auto 0; width:fit-content;
    background:#F1EFE8; color:#6B6455; padding:9px 16px 9px 12px;
    border-radius:var(--radius-full); font-size:13.5px; font-weight:500;
  }
  .answered-pill svg{ width:16px; height:16px; }

  .waiting-note{
    text-align:center; margin-top:22px; color:var(--text-muted); font-size:14.5px;
  }
  .waiting-note .spinner{
    display:inline-block; width:14px; height:14px; border-radius:50%;
    border:2px solid var(--border); border-top-color:var(--accent);
    animation:spin 0.8s linear infinite; margin-right:7px; vertical-align:-2px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* fold overlay */
  .fold-overlay{
    position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:50;
  }
  .fold-paper{
    width:260px; padding:20px 22px; background:#fff; border:1px solid var(--border-soft);
    border-radius:16px; box-shadow:0 20px 40px rgba(33,29,23,0.18);
    font-size:14px; color:var(--text-muted); transform-origin:top center;
    animation:foldAway 0.75s ease forwards;
  }
  @keyframes foldAway{
    0%{ transform:scaleY(1) translateY(0) rotate(0deg); opacity:1; }
    45%{ transform:scaleY(0.15) translateY(0) rotate(-3deg); opacity:1; }
    100%{ transform:scaleY(0.08) translateY(140px) translateX(120px) rotate(24deg); opacity:0; }
  }
  @media (prefers-reduced-motion: reduce){
    .fold-paper{ animation:none; opacity:0; }
  }

  /* ---------- Waiting / spectator ---------- */
  .badge-icon{
    width:52px; height:52px; border-radius:50%; background:var(--accent-soft);
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
  }

  /* ---------- Results ---------- */
  .paper-tabs{ display:flex; gap:6px; overflow-x:auto; padding-bottom:4px; margin-bottom:18px; }
  .paper-tab{
    flex-shrink:0; padding:8px 14px; border-radius:var(--radius-full); border:1px solid var(--border);
    background:#fff; color:var(--text-muted); font-size:13px; font-weight:600; cursor:pointer;
  }
  .paper-tab.active{ background:var(--ink); color:#fff; border-color:var(--ink); }
  .result-lines{ display:flex; flex-direction:column; gap:10px; }
  .result-line{
    display:flex; align-items:baseline; gap:10px; padding:14px 16px; border-radius:14px;
    background:#FBF9F4; border:1px solid var(--border-soft);
    animation:lineIn 0.4s ease both;
  }
  .result-line .num{ font-size:12px; color:var(--text-soft); font-weight:700; width:16px; flex-shrink:0; }
  .result-line .txt{ font-size:17px; font-weight:600; }
  .result-line .who{ margin-left:auto; font-size:12px; color:var(--text-soft); flex-shrink:0; }
  @keyframes lineIn{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:none; } }
  @media (prefers-reduced-motion: reduce){ .result-line{ animation:none; } }

  .new-game-btn{
    width:100%; margin-top:22px; padding:16px 20px; border-radius:20px; border:none;
    background:var(--accent); color:#fff; font-size:15.5px; font-weight:700; cursor:pointer;
  }
  .new-game-btn:hover{ background:var(--accent-hover); }

  footer{ text-align:center; color:var(--text-soft); font-size:12.5px; padding-bottom:26px; }

  @media (max-width:480px){
    .question{ font-size:28px; }
    .card{ padding:26px 20px; border-radius:20px; }
  }
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
  "use strict";

  /* ============== CONFIG ============== */
  const STORAGE_KEY = "zapysochky_state_v1";
  const POLL_MS = 1200;
  const HEARTBEAT_MS = 4000;
  const STALE_MS = 15000;        // no heartbeat for this long -> considered disconnected
  const ROUND_TIMEOUT_MS = 60000; // force-advance a stuck round after this long
  const AUTO_RELOBBY_MS = 18000;  // time results stay up before auto-returning to lobby

  const QUESTIONS = [
    { title:"Який?",       examples:["норовливий","пихатий","той з першого під’їзду","занадто щасливий"] },
    { title:"Хто?",        examples:["маніяк","мисливець на відьом","сусід","водій маршрутки"] },
    { title:"Як?",         examples:["злісно","не поспішаючи","наче нічого не сталося","із захопленням"] },
    { title:"Що зробив?",  examples:["розсмішив","навчив графічному дизайну","спародіював","змусив помити ноги"] },
    { title:"Кого?",       examples:["Святого Миколая","сусідку","найкращого друга","астрологів"] },
  ];

  const ADJ = ["Невідомий","Пустельний","Фіолетовий","Лінивий","Сонний","Кмітливий","Загадковий",
    "Сміливий","Веселий","Тихий","Швидкий","Дивний","Мовчазний","Крихітний","Гучний","Елегантний",
    "Кудлатий","Замріяний","Схвильований","Непередбачуваний","Хитрий","Урочистий","Меланхолійний"];
  const NOUN = ["Жираф","Орел","Ананас","Пінгвін","Їжак","Кіт","Слон","Кабан","Тигр","Бобер",
    "Фламінго","Хом’як","Дракон","Метелик","Восьминіг","Панда","Лев","Вовк","Сова","Черепаха","Тюлень","Бізон"];

  function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
  function uuid(){
    if(window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return "p-"+Math.random().toString(36).slice(2)+Date.now().toString(36);
  }
  function shuffle(arr){
    const a = arr.slice();
    for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
    return a;
  }
  function icon(name){
    if(name==="user") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>';
    if(name==="check") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 13l4 4L19 7"/></svg>';
    if(name==="mail") return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="14" rx="3"/><path d="M4 7l8 6 8-6"/></svg>';
    return "";
  }

  /* ============== LOCAL SESSION (in-memory only; no storage APIs per platform rules) ============== */
  const playerId = uuid();
  const nickname = pick(ADJ) + " " + pick(NOUN);
  let draft = "";
  let localSubmittedRound = 0; // last round number this tab has locally submitted for
  let busy = false;
  let state = null;
  let paperTabIndex = 0;
  let lastFoldShownAt = 0;

  /* ============== STATE HELPERS ============== */
  function freshLobby(carryPlayers, lastResults){
    return {
      status:"lobby",
      players: carryPlayers || {},
      order:null, gameId:null, currentRound:0,
      papers:{}, submissions:{}, roundStartedAt:null,
      finishedAt:null, lastResults: lastResults || null
    };
  }

  async function loadState(){
    try{
      const res = await window.storage.get(STORAGE_KEY, true);
      if(!res) return freshLobby();
      const parsed = JSON.parse(res.value);
      if(!parsed || !parsed.status) return freshLobby();
      return parsed;
    }catch(e){
      return freshLobby();
    }
  }
  async function saveState(s){
    try{ await window.storage.set(STORAGE_KEY, JSON.stringify(s), true); }
    catch(e){ console.error("storage set failed", e); }
  }

  function activePlayerIds(s, now){
    now = now || Date.now();
    return Object.keys(s.players).filter(id => now - (s.players[id].lastSeen||0) < STALE_MS);
  }
  function paperIndexFor(order, playerIdx, round){
    const n = order.length;
    return ((playerIdx - (round - 1)) % n + n) % n;
  }

  /* ============== JOIN / HEARTBEAT ============== */
  async function ensureJoinedAndHeartbeat(s){
    const now = Date.now();
    let changed = false;
    if(!s.players[playerId]){
      const isSpectator = s.status === "playing" && s.order && !s.order.includes(playerId);
      s.players[playerId] = { nickname, joinedAt:now, lastSeen:now, spectator: !!isSpectator };
      changed = true;
    } else if(now - s.players[playerId].lastSeen > HEARTBEAT_MS - 200){
      s.players[playerId].lastSeen = now;
      changed = true;
    }
    if(changed) await saveState(s);
    return s;
  }

  /* ============== ACTIONS ============== */
  async function startGame(){
    if(busy) return;
    busy = true;
    try{
      const s = await loadState();
      const now = Date.now();
      const ids = activePlayerIds(s, now);
      if(s.status !== "lobby" || ids.length < 2) return;
      const order = shuffle(ids);
      const next = {
        status:"playing",
        players: s.players,
        order,
        gameId: uuid(),
        currentRound: 1,
        papers: {},
        submissions: { 1: {} },
        roundStartedAt: now,
        finishedAt: null,
        lastResults: s.lastResults
      };
      await saveState(next);
      state = next;
    } finally { busy = false; }
  }

  async function submitAnswer(text){
    const clean = (text||"").trim();
    if(!clean || busy) return;
    busy = true;
    try{
      const s = await loadState();
      if(s.status !== "playing" || !s.order || !s.order.includes(playerId)) return;
      const r = s.currentRound;
      s.submissions[r] = s.submissions[r] || {};
      if(s.submissions[r][playerId]) return; // already in
      const n = s.order.length;
      const myIdx = s.order.indexOf(playerId);
      const paperIdx = paperIndexFor(s.order, myIdx, r);
      s.papers[paperIdx] = s.papers[paperIdx] || [];
      s.papers[paperIdx].push({ playerId, nickname: s.players[playerId]?.nickname || nickname, answer: clean, round: r });
      s.submissions[r][playerId] = true;
      s.players[playerId] = s.players[playerId] || { nickname, joinedAt:Date.now() };
      s.players[playerId].lastSeen = Date.now();
      await saveState(s);
      state = s;
      localSubmittedRound = r;
      draft = "";
      lastFoldShownAt = Date.now();
    } finally { busy = false; }
  }

  async function maybeAdvanceRound(s){
    if(s.status !== "playing") return s;
    const r = s.currentRound;
    const order = s.order;
    const submitted = s.submissions[r] || {};
    const now = Date.now();
    const allSubmitted = order.every(id => submitted[id]);
    const timedOut = s.roundStartedAt && (now - s.roundStartedAt > ROUND_TIMEOUT_MS);

    if(!allSubmitted && timedOut){
      const staleMissing = order.filter(id => !submitted[id] && now - (s.players[id]?.lastSeen||0) > STALE_MS);
      if(staleMissing.length){
        const fresh = await loadState();
        if(fresh.status === "playing" && fresh.currentRound === r){
          const subs = fresh.submissions[r] || {};
          let changed = false;
          fresh.order.forEach((id, idx) => {
            if(!subs[id] && now - (fresh.players[id]?.lastSeen||0) > STALE_MS){
              const paperIdx = paperIndexFor(fresh.order, idx, r);
              fresh.papers[paperIdx] = fresh.papers[paperIdx] || [];
              fresh.papers[paperIdx].push({ playerId:id, nickname: fresh.players[id]?.nickname || "Хтось", answer:"…", round:r });
              subs[id] = true;
              changed = true;
            }
          });
          if(changed){
            fresh.submissions[r] = subs;
            await saveState(fresh);
            return fresh;
          }
        }
      }
      return s;
    }

    if(allSubmitted){
      const fresh = await loadState();
      if(fresh.status === "playing" && fresh.currentRound === r){
        if(r >= 5){
          fresh.status = "finished";
          fresh.finishedAt = Date.now();
          fresh.lastResults = {
            gameId: fresh.gameId,
            order: fresh.order,
            players: fresh.players,
            papers: fresh.papers,
            finishedAt: fresh.finishedAt
          };
        } else {
          fresh.currentRound = r + 1;
          fresh.submissions[r+1] = {};
          fresh.roundStartedAt = Date.now();
        }
        await saveState(fresh);
        return fresh;
      }
    }
    return s;
  }

  async function returnToLobby(){
    if(busy) return;
    busy = true;
    try{
      const s = await loadState();
      if(s.status !== "finished") return;
      const now = Date.now();
      const kept = {};
      Object.entries(s.players).forEach(([id,p]) => {
        if(now - (p.lastSeen||0) < STALE_MS) kept[id] = { nickname:p.nickname, joinedAt:now, lastSeen: now };
      });
      const next = freshLobby(kept, s.lastResults);
      await saveState(next);
      state = next;
    } finally { busy = false; }
  }

  /* ============== RENDER ============== */
  const app = document.getElementById("app");

  function header(){
    return `
      <div class="topbar">
        <button class="logo" onclick="location.reload()">Записочки</button>
        <div class="whoami"><span class="dot"></span>Ви: <b>${escapeHtml(nickname)}</b></div>
      </div>`;
  }
  function footer(){
    return `<footer>Анонімна гра · нікнейм діє лише для цієї вкладки</footer>`;
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
  }

  function renderLobby(s){
    const now = Date.now();
    const ids = activePlayerIds(s, now);
    const count = ids.length;
    const canStart = count >= 2;
    const pills = ids.map(id => `<div class="player-pill">${icon("user")}${escapeHtml(s.players[id].nickname)}</div>`).join("");

    app.innerHTML = `
      ${header()}
      <main>
        <div class="card center">
          <p class="eyebrow">Лобі</p>
          <h1 style="margin:0 0 6px;font-size:26px;">Очікуємо гравців</h1>
          <p class="muted" style="margin:0 0 4px;font-size:14.5px;">Потрібно щонайменше 2 гравці, щоб почати сет</p>
          <div class="player-pills">${pills || '<span class="muted" style="font-size:13.5px;">Ще нікого немає…</span>'}</div>
          <button id="startBtn" class="start-btn" ${canStart ? "" : "disabled"}>
            ${canStart ? `Почати гру · ${count} ${plural(count)}` : "Потрібен ще один гравець"}
          </button>
        </div>
      </main>
      ${footer()}
    `;
    const btn = document.getElementById("startBtn");
    if(btn) btn.onclick = startGame;
  }

  function plural(n){
    const mod10 = n % 10, mod100 = n % 100;
    if(mod10===1 && mod100!==11) return "гравець";
    if([2,3,4].includes(mod10) && ![12,13,14].includes(mod100)) return "гравці";
    return "гравців";
  }

  function renderSpectator(s){
    const now = Date.now();
    const active = activePlayerIds(s, now).length;
    app.innerHTML = `
      ${header()}
      <main>
        <div class="card center">
          <div class="badge-icon">${icon("mail")}</div>
          <h1 style="margin:0 0 8px;font-size:22px;">Гру вже розпочато</h1>
          <p class="muted" style="font-size:14.5px;line-height:1.6;">
            Ви приєднались, поки грали інші. Зачекайте, будь ласка — щойно поточний сет завершиться,
            автоматично почнеться нове лобі, і ви зможете грати.
          </p>
          <p class="muted" style="font-size:13px;margin-top:18px;"><span class="spinner"></span>Зараз онлайн: ${active}</p>
        </div>
      </main>
      ${footer()}
    `;
  }

  function renderPlaying(s){
    const order = s.order;
    const myIdx = order.indexOf(playerId);
    if(myIdx === -1){ renderSpectator(s); return; }

    const r = s.currentRound;
    const q = QUESTIONS[r-1];
    const submittedMap = s.submissions[r] || {};
    const answeredCount = order.filter(id => submittedMap[id]).length;
    const total = order.length;
    const iHaveSubmitted = !!submittedMap[playerId];

    const showFold = lastFoldShownAt && (Date.now() - lastFoldShownAt < 750) && localSubmittedRound === r;

    app.innerHTML = `
      ${header()}
      <main>
        <div class="card">
          <div class="round-label">Раунд ${r} з 5</div>
          <h1 class="question">${escapeHtml(q.title)}</h1>
          <div class="examples serif-example">
            ${q.examples.map(e => `<div>${escapeHtml(e)}</div>`).join("")}
          </div>
          ${iHaveSubmitted ? `
            <div class="waiting-note" style="margin-top:4px;"><span class="spinner"></span>Чекаємо на інших гравців…</div>
          ` : `
            <input id="answerInput" class="answer-input" placeholder="${escapeHtml(q.title)}" autocomplete="off" value="${escapeHtml(draft)}" />
            <button id="submitBtn" class="submit-btn">Відповісти</button>
          `}
          <div class="answered-pill">${icon("user")}Відповіли&nbsp;<b>${answeredCount} із ${total}</b></div>
        </div>
      </main>
      ${footer()}
      ${showFold ? `<div class="fold-overlay"><div class="fold-paper">${escapeHtml(q.title)} — ваша записочка складена і передана далі ✓</div></div>` : ""}
    `;

    if(!iHaveSubmitted){
      const input = document.getElementById("answerInput");
      const btn = document.getElementById("submitBtn");
      const doSubmit = () => submitAnswer(input.value);
      input.addEventListener("input", e => { draft = e.target.value; });
      input.addEventListener("keydown", e => { if(e.key === "Enter") doSubmit(); });
      btn.onclick = doSubmit;
      input.focus();
    }
  }

  function renderFinished(s){
    const results = s.lastResults;
    if(!results){ renderLobby(freshLobby()); return; }
    const n = results.order.length;
    const paper = results.papers[paperTabIndex] || [];
    const sorted = paper.slice().sort((a,b) => a.round - b.round);

    const tabs = results.order.map((_, i) =>
      `<button class="paper-tab ${i===paperTabIndex ? "active":""}" data-idx="${i}">Записочка ${i+1}</button>`
    ).join("");

    const lines = sorted.map(a =>
      `<div class="result-line"><span class="num">${a.round}</span><span class="txt">${escapeHtml(a.answer)}</span><span class="who">${escapeHtml(a.nickname)}</span></div>`
    ).join("");

    app.innerHTML = `
      ${header()}
      <main>
        <div class="card">
          <p class="eyebrow">Сет завершено</p>
          <h1 style="margin:0 0 4px;font-size:24px;">Читаємо записочки</h1>
          <p class="muted" style="font-size:14px;margin:0 0 18px;">Перегляньте усі ${n} записочок цього сету</p>
          <div class="paper-tabs">${tabs}</div>
          <div class="result-lines">${lines}</div>
          <button id="newGameBtn" class="new-game-btn">Готові до нової гри</button>
        </div>
      </main>
      ${footer()}
    `;
    document.querySelectorAll(".paper-tab").forEach(btn => {
      btn.onclick = () => { paperTabIndex = parseInt(btn.dataset.idx, 10); renderFinished(state); };
    });
    document.getElementById("newGameBtn").onclick = returnToLobby;
  }

  function render(s){
    if(!s) return;
    if(s.status === "lobby") renderLobby(s);
    else if(s.status === "playing") renderPlaying(s);
    else if(s.status === "finished") renderFinished(s);
  }

  /* ============== MAIN LOOP ============== */
  async function tick(){
    try{
      let s = await loadState();
      s = await ensureJoinedAndHeartbeat(s);
      s = await maybeAdvanceRound(s);

      if(s.status === "finished" && s.finishedAt && Date.now() - s.finishedAt > AUTO_RELOBBY_MS){
        await returnToLobby();
        s = state || s;
      }

      state = s;
      render(s);
    }catch(e){
      console.error("tick error", e);
    }
  }

  tick();
  setInterval(tick, POLL_MS);
})();
</script>
</body>
</html>
